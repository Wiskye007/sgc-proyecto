services:
  # Base de datos PostgreSQL (el backend usa psycopg2 / DATABASE_URL)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgc_password}
      POSTGRES_DB: ${POSTGRES_DB:-sgc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgc} -d ${POSTGRES_DB:-sgc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Flask
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sgc}:${POSTGRES_PASSWORD:-sgc_password}@postgres:5432/${POSTGRES_DB:-sgc}"
      FLASK_ENV: development
      FLASK_PORT: 5000
      # Clave para firmar los tokens de sesión
      SECRET_KEY: ${SECRET_KEY:-cambia-esta-clave-en-produccion}
      ALLOWED_ORIGINS: "http://localhost:3000"
      REQUIRE_AUTH: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
    depends_on:
      - backend

volumes:
  postgres_data:
