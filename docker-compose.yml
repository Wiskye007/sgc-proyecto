version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourPassword123!", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_DRIVER: "ODBC Driver 17 for SQL Server"
      DATABASE_SERVER: sqlserver
      DATABASE_PORT: 1433
      DATABASE_NAME: SGC
      DATABASE_USER: sa
      DATABASE_PASSWORD: "YourPassword123!"
      FLASK_ENV: development
      FLASK_DEBUG: "True"
      FLASK_PORT: 5000
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: python -m backend.app

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:5000"
    depends_on:
      - backend
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib

volumes:
  sqlserver_data:
